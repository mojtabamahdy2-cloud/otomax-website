<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <!-- Define the repeating pattern unit -->
    <pattern id="logoPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      
      <!-- Stylized Network Logo -->
      <g fill="none" stroke="#7B2FFF" stroke-width="1.5" opacity="0.8">
        <!-- Outer Circle Nodes -->
        <circle cx="20" cy="20" r="15" stroke-dasharray="2,2" opacity="0.3"/>
        
        <!-- Connecting Lines (The "X" core) -->
        <path d="M12,12 L28,28 M28,12 L12,28" stroke-linecap="round"/>
        
        <!-- Connection Nodes -->
        <circle cx="20" cy="5"  r="2" fill="#7B2FFF" stroke="none"/>
        <circle cx="20" cy="35" r="2" fill="#7B2FFF" stroke="none"/>
        <circle cx="5"  cy="20" r="2" fill="#7B2FFF" stroke="none"/>
        <circle cx="35" cy="20" r="2" fill="#7B2FFF" stroke="none"/>
        <circle cx="20" cy="20" r="3" fill="#7B2FFF" stroke="none"/>
      </g>
      
    </pattern>
  </defs>

  <!-- Apply the pattern to a background rectangle -->
  <rect width="100%" height="100%" fill="url(#logoPattern)" />
</svg>
